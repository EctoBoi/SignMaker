<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width" />
        <title>Sign Maker</title>
        <link rel="icon" type="image/x-icon" href="signpost.ico" />
        <style>
            body {
                visibility: hidden;
            }
        </style>
        <link href="src/style.css" rel="stylesheet" type="text/css" />
    </head>

    <body>
        <div id="content">
            <h1>Sign Maker</h1>

            <div id="formSearch">
                <div class="formInputDiv" id="formSearchBassProInput">
                    <input type="text" id="searchBassProInput" size="30" />
                    <button class="button-87" role="button" id="searchBassPro">Search Bass Pro</button>
                </div>
            </div>
            <div style="display: none" id="formSearchResults">
                <div id="bassProResults" class="product-card"></div>
                <button class="button-87" role="button" id="fillFromInfoButton">Fill From Info</button>
            </div>

            <div id="form">
                <div class="col">
                    <div class="formInputDiv" id="formSignType">
                        <p>Sign Type</p>
                        <select id="types"></select>
                    </div>
                    <div class="formInputDiv" id="formTitle1">
                        <p>Title 1</p>
                        <input type="text" id="title1" size="30" />
                    </div>
                    <div class="formInputDiv" id="formTitle2">
                        <p>Title 2</p>
                        <input type="text" id="title2" size="30" />
                    </div>
                    <div class="formInputDiv" id="formExtras">
                        <p>Extras</p>
                        <input type="text" id="extras" size="30" />
                    </div>
                </div>
                <div class="col">
                    <div class="formInputDiv" id="formPrice">
                        <p>Price</p>
                        <input type="text" id="price" size="12" />
                    </div>
                    <div class="formInputDiv" id="formSKU">
                        <p>SKU</p>
                        <input type="text" id="sku" size="12" />
                    </div>
                    <div class="formInputDiv" id="formRegPrice">
                        <p>Reg. Price</p>
                        <input type="text" id="regPrice" size="12" />
                    </div>
                    <div class="formInputDiv" id="formSaleEndDate">
                        <p>Sale End Date</p>
                        <input type="date" id="endDate" placeholder="MON DD, YYYY" size="15" />
                    </div>
                </div>
            </div>

            <div class="button-wrapper">
                <div class="formInputDiv" id="formCopies">
                    <p>Copies</p>
                    <input type="number" id="copies" value="1" size="5" min="1" />
                </div>
                <button class="button-87" role="button" id="createButton">Create</button>
                <div class="formInputDiv" id="formMirror" style="visibility: hidden">
                    <p>Mirror</p>
                    <input type="checkbox" id="mirror" checked />
                </div>
            </div>

            <button class="button-87" role="button" id="printButton" style="visibility: hidden">Print</button>

            <div id="canvasDiv"></div>

            <button class="button-87" role="button" id="saveToBatch" style="visibility: hidden">Save To Batch</button>
            <div class="formInputDiv" id="formBatchSelect" style="visibility: hidden">
                <p>Batch</p>
                <select id="selectBatch">
                    <option value="" disabled selected>No Batches</option>
                </select>
            </div>
            <button class="button-87" role="button" id="printBatch" style="visibility: hidden">Print Batch</button>

            <div id="batchPreview"></div>

            <button class="button-87" role="button" id="clearBatch" style="visibility: hidden">Clear Batch</button>
        </div>

        <script type="module" src="src/main.ts"></script>
    </body>
</html>
